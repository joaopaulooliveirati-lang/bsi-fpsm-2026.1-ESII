  <line x1="468.79999999999995" y1="220" x2="636.5999999999999" y2="220" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <line x1="468.79999999999995" y1="228" x2="636.5999999999999" y2="228" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="476.79999999999995" y="242" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">salvar(aluno)</tspan></text>
  <text x="476.79999999999995" y="262" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">buscar_por_nome(nome)</tspan></text>
