  <line x1="40" y1="220" x2="267.2" y2="220" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <line x1="40" y1="228" x2="267.2" y2="228" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="48" y="242" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">enviar(destinatario, mensagem)</tspan></text>
</g>
<g class="class-node" data-id="AcademiaService" data-label="AcademiaService">
  <rect x="108.35" y="40" width="181" height="88" rx="0" ry="0" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="108.35" y="40" width="181" height="32" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="198.85" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="var(--_text)" dy="4.55">AcademiaService</text>
  <line x1="108.35" y1="72" x2="289.35" y2="72" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <line x1="108.35" y1="80" x2="289.35" y2="80" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="116.35" y="94" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">matricular(nome, plano)</tspan></text>
  <text x="116.35" y="114" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">+ </tspan><tspan fill="var(--_text-sec)">fazer_checkin(nome)</tspan></text>
