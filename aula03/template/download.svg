  <text x="315.2" y="234" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">- </tspan><tspan fill="var(--_text-sec)">int</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">id:</tspan></text>
  <text x="315.2" y="254" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">- </tspan><tspan fill="var(--_text-sec)">str</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">nome:</tspan></text>
  <text x="315.2" y="274" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">- </tspan><tspan fill="var(--_text-sec)">str</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">plano:</tspan></text>
  <text x="315.2" y="294" class="mono" dy="0.35em" font-size="11" font-weight="400"><tspan fill="var(--_text-faint)">- </tspan><tspan fill="var(--_text-sec)">int</tspan><tspan fill="var(--_text-faint)">: </tspan><tspan fill="var(--_text-muted)">checkins:</tspan></text>
  <line x1="307.2" y1="308" x2="428.79999999999995" y2="308" stroke="var(--_node-stroke)" stroke-width="0.75" />
</g>
